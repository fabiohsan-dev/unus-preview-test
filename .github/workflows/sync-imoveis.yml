name: Sync Imóveis (Vista → Supabase)

on:
  schedule:
    # A cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Permite execução manual pelo painel do GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          echo "🔄 Triggering sync at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${DEPLOY_URL}/api/cron/sync-imoveis")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Sync failed with status ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ Sync completed successfully"
